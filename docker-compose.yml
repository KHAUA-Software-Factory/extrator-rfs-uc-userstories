services:
  app:
    build: .
    image: extrator-casos-de-uso:latest
    container_name: extrator-casos-de-uso
    restart: unless-stopped
    ports:
      - "8765:8765"
    env_file:
      - .env
    environment:
      GUI_HOST: 0.0.0.0
      GUI_PORT: 8765
      GUI_OPEN_BROWSER: "0"
      GUI_OUTPUT_DIR: /app/outputs/web_gui
    volumes:
      - ./outputs:/app/outputs
