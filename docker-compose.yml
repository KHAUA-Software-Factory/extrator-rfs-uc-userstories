services:
  app:
    build: .
    image: extrator-casos-de-uso:latest
    container_name: extrator-casos-de-uso
    restart: unless-stopped
    ports:
      - "8765:8765"
    # Compose v2.24+: permite `docker compose build` sem copiar .env primeiro.
    # Sem OPENAI_API_KEY valida a interface sobe, mas a extracao com IA falha ate criar o .env.
    env_file:
      - path: .env
        required: false
    environment:
      GUI_HOST: 0.0.0.0
      GUI_PORT: 8765
      GUI_OPEN_BROWSER: "0"
      GUI_OUTPUT_DIR: /app/outputs/web_gui
    volumes:
      - ./outputs:/app/outputs
