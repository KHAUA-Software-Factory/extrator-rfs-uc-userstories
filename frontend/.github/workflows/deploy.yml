# Usado quando este diretório é a raiz do repositório (repo só do frontend).
name: Deploy via FTP

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: ms.khaua.com.br
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_VERSION: 22
      FRONTEND_PUBLIC_PATH: /
      FRONTEND_API_BASE_URL: https://ms-app.khaua.com.br
      FRONTEND_REMOTE_DIR: public_html/ms

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Criar .env.production
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_BASE_PATH: ${{ secrets.VITE_BASE_PATH }}
        run: |
          touch .env.production
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" >> .env.production
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" >> .env.production
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> .env.production
          echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" >> .env.production
          echo "VITE_API_BASE_URL=${VITE_API_BASE_URL:-${FRONTEND_API_BASE_URL}}" >> .env.production
          echo "VITE_BASE_PATH=${VITE_BASE_PATH:-${FRONTEND_PUBLIC_PATH}}" >> .env.production

      - name: Instalar dependências
        run: npm ci

      - name: Validar código
        run: |
          npm run lint
          npm run test
          npm audit --omit=dev

      - name: Build
        run: npm run build

      - name: FTP Deploy Locaweb
        uses: locaweb/ftp-deploy@1.0.0
        with:
          host: ${{ secrets.HOST }}
          user: ${{ secrets.USER }}
          password: ${{ secrets.PASS }}
          localDir: dist
          remoteDir: ${{ env.FRONTEND_REMOTE_DIR }}
          forceSsl: false
