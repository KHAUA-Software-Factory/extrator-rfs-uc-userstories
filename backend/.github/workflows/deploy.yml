# Usado quando este diretório é a raiz do repositório (repo só do backend).
name: Deploy via FTP

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: ms-app.khaua.com.br
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_VERSION: 22
      BACKEND_PUBLIC_PATH: /
      BACKEND_PUBLIC_REMOTE_DIR: public_html/ms-app
      BACKEND_APP_REMOTE_DIR: nodeapps/ms-app
      BACKEND_APP_ROOT: /home/storage/b/50/72/khaua1/nodeapps/ms-app
      BACKEND_NODE_BIN: ''
      BACKEND_ARTIFACT_DIR: deploy

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar dependências
        run: npm ci

      - name: Validar código
        run: |
          npm run lint
          npm run test
          npm audit --omit=dev --audit-level=moderate

      - name: Build
        run: npm run build

      - name: Credenciais Firebase (service account)
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Defina o secret FIREBASE_SERVICE_ACCOUNT_JSON no repositório."
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > service-account.json

      - name: Criar .env de produção
        env:
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
          BACKEND_HOST: ${{ secrets.BACKEND_HOST }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
        run: |
          {
            echo "PORT=${BACKEND_PORT:-4000}"
            echo "HOST=${BACKEND_HOST}"
            echo "OPENAI_API_KEY=${OPENAI_API_KEY}"
            echo "OPENAI_MODEL=${OPENAI_MODEL:-gpt-5.2}"
            echo "OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}"
            echo "ADMIN_EMAILS=${ADMIN_EMAILS}"
            echo "FIREBASE_SERVICE_ACCOUNT_FILE=service-account.json"
            echo "NODE_ENV=production"
            echo "PASSENGER_RUNTIME=1"
          } > .env

      - name: Preparar artefato de produção
        env:
          FTP_USER: ${{ secrets.USER }}
          BACKEND_APP_ROOT_OVERRIDE: ${{ secrets.BACKEND_APP_ROOT }}
          BACKEND_BASE_URI_OVERRIDE: ${{ secrets.BACKEND_BASE_URI }}
          BACKEND_NODE_PATH_OVERRIDE: ${{ secrets.BACKEND_NODE_PATH }}
        run: |
          app_root="${BACKEND_APP_ROOT_OVERRIDE:-${BACKEND_APP_ROOT}}"
          base_uri="${BACKEND_BASE_URI_OVERRIDE:-${BACKEND_PUBLIC_PATH}}"
          node_path="${BACKEND_NODE_PATH_OVERRIDE:-${BACKEND_NODE_BIN}}"

          if [ -z "$app_root" ]; then
            echo "Defina BACKEND_APP_ROOT."
            exit 1
          fi

          rm -rf "$BACKEND_ARTIFACT_DIR"
          mkdir -p "$BACKEND_ARTIFACT_DIR/app/tmp" "$BACKEND_ARTIFACT_DIR/public"
          cp dist/index.cjs "$BACKEND_ARTIFACT_DIR/app/index.js"
          cp .env service-account.json "$BACKEND_ARTIFACT_DIR/app/"
          date -u +"%Y-%m-%dT%H:%M:%SZ" > "$BACKEND_ARTIFACT_DIR/app/tmp/restart.txt"

          {
            echo "# Gerado pelo GitHub Actions para Locaweb/cPanel + Passenger."
            echo "RewriteEngine On"
            echo "RewriteRule ^(\\.env|service-account\\.json|index\\.js|package(-lock)?\\.json)$ - [F,L]"
            echo "RewriteCond %{HTTPS} !=on"
            echo "RewriteCond %{HTTP:X-Forwarded-Proto} !https [NC]"
            echo "RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]"
            echo ""
            echo "# DO NOT REMOVE. CLOUDLINUX PASSENGER CONFIGURATION BEGIN"
            echo "PassengerAppRoot \"$app_root\""
            echo "PassengerBaseURI \"$base_uri\""
            if [ -n "$node_path" ]; then
              echo "PassengerNodejs \"$node_path\""
            fi
            echo "PassengerAppType node"
            echo "PassengerStartupFile index.js"
            echo "PassengerAppEnv production"
            echo "# DO NOT REMOVE. CLOUDLINUX PASSENGER CONFIGURATION END"
            echo ""
            echo "DirectoryIndex disabled"
          } > "$BACKEND_ARTIFACT_DIR/public/.htaccess"

      - name: FTP Deploy Node app
        uses: locaweb/ftp-deploy@1.0.0
        with:
          host: ${{ secrets.HOST }}
          user: ${{ secrets.USER }}
          password: ${{ secrets.PASS }}
          localDir: ${{ env.BACKEND_ARTIFACT_DIR }}/app
          remoteDir: ${{ env.BACKEND_APP_REMOTE_DIR }}
          forceSsl: false
          options: >-
            --exclude-glob coverage
            --exclude-glob coverage/**
            --exclude-glob .github
            --exclude-glob .github/**
            --exclude-glob *.log
            --exclude-glob npm-debug.log*

      - name: FTP Deploy public bridge
        uses: locaweb/ftp-deploy@1.0.0
        with:
          host: ${{ secrets.HOST }}
          user: ${{ secrets.USER }}
          password: ${{ secrets.PASS }}
          localDir: ${{ env.BACKEND_ARTIFACT_DIR }}/public
          remoteDir: ${{ env.BACKEND_PUBLIC_REMOTE_DIR }}
          forceSsl: false
          options: >-
            --exclude-glob coverage
            --exclude-glob coverage/**
            --exclude-glob .github
            --exclude-glob .github/**
            --exclude-glob *.log
            --exclude-glob npm-debug.log*
